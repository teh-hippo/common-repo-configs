name: mdBook Pages (reusable)

# Shared mdBook build-and-deploy runner for GitHub Pages. The caller owns its
# triggers (typically a push to the docs path plus a manual dispatch) and grants
# the Pages permissions; this workflow builds the book and publishes it. The
# consuming repo must set its Pages source to "GitHub Actions" for the deploy
# step to succeed.

on:
  workflow_call:
    inputs:
      path:
        description: "Directory containing book.toml."
        required: false
        type: string
        default: "."

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install mdBook
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: mdbook

      - name: Build the book
        working-directory: ${{ inputs.path }}
        run: mdbook build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ${{ inputs.path }}/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
