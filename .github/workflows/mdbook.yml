name: mdBook Pages (reusable)

# Shared mdBook build-and-deploy runner for GitHub Pages. The caller owns its
# triggers (typically a push to the docs path plus a manual dispatch) and grants
# the Pages permissions; this workflow builds the book and publishes it. The
# consuming repo must set its Pages source to "GitHub Actions" for the deploy
# step to succeed.

on:
  workflow_call:
    inputs:
      path:
        description: "Directory containing book.toml."
        required: false
        type: string
        default: "."

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install mdBook
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: mdbook

      - name: Build the book
        working-directory: ${{ inputs.path }}
        run: mdbook build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ${{ inputs.path }}/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outcome == 'success' && steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # deploy-pages treats a reported deployment_failed as terminal (only the
      # transient deployment_attempt_error is auto-retried); GitHub Pages emits it
      # intermittently, so retry the deploy once.
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

      - name: Back off before retrying
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
