name: Validate Renovate config

on:
  pull_request:
    paths:
      - renovate/**
      - .github/workflows/renovate-validate.yml
  push:
    branches: [main]
    paths:
      - renovate/**

permissions:
  contents: read

jobs:
  validate:
    name: renovate-config-validator
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Validate base preset
        run: npx --yes --package renovate -- renovate-config-validator renovate/default.json5
