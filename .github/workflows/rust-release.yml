name: Rust Release (reusable)

# Shared Rust release runner: builds cross-platform binaries on their native
# runners, uploads them to the tag's GitHub release with checksums and build
# provenance, and optionally publishes crates to crates.io. The caller owns its
# triggers (a tag push) and grants contents/id-token/attestations. Each build leg
# is described by an object in the `targets` input ({target, os, build-tool,
# label, rustflags}), so Windows-MSVC and Windows-ARM64 build natively rather than
# being cross-compiled. Publishing uses the crates.io Trusted Publisher flow
# (OIDC), so no registry token is stored.

on:
  workflow_call:
    inputs:
      binary-name:
        description: "Name of the binary to build and package (passed to cargo --bin)."
        required: true
        type: string
      targets:
        description: >
          JSON array of build legs consumed via fromJSON as matrix.include. Each entry is an
          object: target (Rust triple), os (runner label, e.g. ubuntu-24.04/windows-latest/
          windows-11-arm), build-tool (cargo or cross), label (short asset label, e.g.
          x86_64-linux), and optional rustflags applied via RUSTFLAGS for that leg.
        required: false
        type: string
        default: '[{"target":"x86_64-unknown-linux-musl","os":"ubuntu-24.04","build-tool":"cargo","label":"x86_64-linux"},{"target":"aarch64-unknown-linux-musl","os":"ubuntu-24.04","build-tool":"cross","label":"aarch64-linux"},{"target":"x86_64-pc-windows-msvc","os":"windows-latest","build-tool":"cargo","label":"x86_64-windows","rustflags":"-C target-feature=+crt-static"}]'
      publish-crates:
        description: "JSON array of crate package names to cargo publish in order (dependencies first). Empty array skips publishing."
        required: false
        type: string
        default: '[]'
      archive-prefix:
        description: "Archive filename prefix. Falls back to binary-name when empty."
        required: false
        type: string
        default: ''
      dry-run:
        description: "Build and package on every leg but skip upload, provenance, and crate publishing. Use to validate the matrix without a release."
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.targets) }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    defaults:
      run:
        shell: bash
    env:
      TAG: ${{ github.ref_name }}
      BIN: ${{ inputs.binary-name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: ${{ contains(matrix.target, 'musl') && matrix.build-tool != 'cross' }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install mingw tools
        if: ${{ contains(matrix.target, 'windows-gnu') }}
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.target }}

      - name: Verify tag matches Cargo.toml version
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          CARGO_VER="$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)"
          TAG_VER="${TAG#v}"
          if [ "$CARGO_VER" != "$TAG_VER" ]; then
            echo "::error::Tag ${TAG} does not match Cargo.toml version ${CARGO_VER}"
            exit 1
          fi

      - name: Build and upload ${{ inputs.binary-name }}
        id: build
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: ${{ inputs.binary-name }}
          target: ${{ matrix.target }}
          build-tool: ${{ matrix.build-tool }}
          archive: ${{ inputs.archive-prefix || inputs.binary-name }}-$tag-${{ matrix.label }}
          checksum: sha256
          tar: unix
          zip: windows
          dry-run: ${{ inputs.dry-run }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Smoke test the built binary
        if: ${{ matrix.build-tool != 'cross' }}
        run: |
          BIN_PATH="target/${{ matrix.target }}/release/${BIN}"
          [ "${RUNNER_OS}" = "Windows" ] && BIN_PATH="${BIN_PATH}.exe"
          "${BIN_PATH}" version

      - name: Attest build provenance for the release archive
        if: ${{ !inputs.dry-run }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.build.outputs.tar }}${{ steps.build.outputs.zip }}

  publish:
    if: ${{ inputs.publish-crates != '[]' && !inputs.dry-run }}
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          CRATES: ${{ inputs.publish-crates }}
        run: |
          mapfile -t CRATE_LIST < <(jq -r '.[]' <<<"$CRATES")
          for crate in "${CRATE_LIST[@]}"; do
            echo "::group::Publishing ${crate}"
            published=false
            for attempt in $(seq 1 6); do
              if cargo publish -p "$crate" --locked --no-verify 2>&1 | tee publish.log; then
                published=true
                break
              fi
              if grep -qiE 'already exists|already uploaded' publish.log; then
                echo "${crate} is already on crates.io; treating as success."
                published=true
                break
              fi
              echo "Attempt ${attempt}/6 for ${crate} failed; waiting 15s for the index to refresh..."
              sleep 15
            done
            echo "::endgroup::"
            if [ "$published" != true ]; then
              echo "::error::Failed to publish ${crate} after 6 attempts."
              exit 1
            fi
          done
