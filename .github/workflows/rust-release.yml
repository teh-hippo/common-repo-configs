name: Rust Release (reusable)

# Shared Rust release runner: builds cross-platform binaries, attaches them to
# the tag's GitHub release with checksums and build provenance, and optionally
# publishes crates to crates.io. The caller owns its triggers (a tag push) and
# grants contents/id-token/attestations; the target list, binary name, archive
# prefix, and crate publish order all arrive as inputs. Publishing uses the
# crates.io Trusted Publisher flow (OIDC), so no registry token is stored.

on:
  workflow_call:
    inputs:
      binary-name:
        description: "Name of the binary to build and package (passed to cargo --bin)."
        required: true
        type: string
      targets:
        description: "JSON array of Rust target triples to build, consumed via fromJSON."
        required: false
        type: string
        default: '["x86_64-unknown-linux-musl","aarch64-unknown-linux-musl","x86_64-pc-windows-gnu"]'
      publish-crates:
        description: "JSON array of crate package names to cargo publish in order (dependencies first). Empty array skips publishing."
        required: false
        type: string
        default: '[]'
      archive-prefix:
        description: "Archive filename prefix. Falls back to binary-name when empty."
        required: false
        type: string
        default: ''

permissions: {}

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(inputs.targets) }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      TAG: ${{ github.ref_name }}
      TARGET: ${{ matrix.target }}
      BIN: ${{ inputs.binary-name }}
      ARCHIVE_PREFIX: ${{ inputs.archive-prefix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl') && !contains(matrix.target, 'aarch64')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install mingw tools
        if: contains(matrix.target, 'windows-gnu')
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.target }}

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VER="$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)"
          TAG_VER="${TAG#v}"
          if [ "$CARGO_VER" != "$TAG_VER" ]; then
            echo "::error::Tag ${TAG} does not match Cargo.toml version ${CARGO_VER}"
            exit 1
          fi

      - name: Build ${{ inputs.binary-name }}
        run: |
          if [[ "$TARGET" == aarch64-* ]]; then
            cargo install cross --locked
            cross build --release --target "$TARGET" --bin "$BIN"
          else
            cargo build --release --target "$TARGET" --bin "$BIN"
          fi

      - name: Package release
        run: |
          ARCH="${TARGET%%-*}"
          case "$TARGET" in
            *windows*) OS_LABEL=windows; EXT=zip; EXE=.exe ;;
            *apple*|*darwin*) OS_LABEL=macos; EXT=tar.gz; EXE="" ;;
            *) OS_LABEL=linux; EXT=tar.gz; EXE="" ;;
          esac
          PREFIX="${ARCHIVE_PREFIX:-$BIN}"
          ARCHIVE_NAME="${PREFIX}-${TAG}-${ARCH}-${OS_LABEL}"
          mkdir -p release
          cp "target/${TARGET}/release/${BIN}${EXE}" release/
          cd release
          if [ "$EXT" = "zip" ]; then
            zip -r "../${ARCHIVE_NAME}.zip" "${BIN}${EXE}"
          else
            tar czf "../${ARCHIVE_NAME}.tar.gz" "${BIN}${EXE}"
          fi
          cd ..
          sha256sum "${ARCHIVE_NAME}.${EXT}" >> checksums-sha256.txt
          echo "ARCHIVE_FILE=${ARCHIVE_NAME}.${EXT}" >> "$GITHUB_ENV"

      - name: Attest build provenance for the release archive
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ env.ARCHIVE_FILE }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            ${{ env.ARCHIVE_FILE }}
            checksums-sha256.txt

  publish:
    if: ${{ inputs.publish-crates != '[]' }}
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1
        id: auth

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          CRATES: ${{ inputs.publish-crates }}
        run: |
          mapfile -t CRATE_LIST < <(jq -r '.[]' <<<"$CRATES")
          for crate in "${CRATE_LIST[@]}"; do
            echo "::group::Publishing ${crate}"
            published=false
            for attempt in $(seq 1 6); do
              if cargo publish -p "$crate" --locked --no-verify 2>&1 | tee publish.log; then
                published=true
                break
              fi
              if grep -qiE 'already exists|already uploaded' publish.log; then
                echo "${crate} is already on crates.io; treating as success."
                published=true
                break
              fi
              echo "Attempt ${attempt}/6 for ${crate} failed; waiting 15s for the index to refresh..."
              sleep 15
            done
            echo "::endgroup::"
            if [ "$published" != true ]; then
              echo "::error::Failed to publish ${crate} after 6 attempts."
              exit 1
            fi
          done
