name: Security Audit (reusable)

# Shared cargo-audit runner. Runs `cargo audit` directly rather than the
# rustsec/audit-check wrapper, which repeatedly lagged GitHub's Node runtime
# deprecations; this keeps the audit free of any third-party action or Node
# runtime. Callers define their own triggers (typically a weekly schedule plus
# push to the default branch) and pass working-directory when the crate is not
# at the repo root. The run fails only on an actual vulnerability; informational
# advisories (unmaintained/unsound/yanked) are reported but do not fail it.

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Cargo.toml / Cargo.lock to scan."
        required: false
        type: string
        default: "."

permissions: {}

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        working-directory: ${{ inputs.working-directory }}
        run: cargo audit
